services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: workflow
      POSTGRES_USER: workflow
      POSTGRES_PASSWORD: workflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workflow"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    env_file: .env.example
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: bash -lc "alembic upgrade head && python scripts/seed.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
