{% extends 'base.html' %}
{% block content %}
<h2>Workflow Definitions</h2>
<form method="post" action="/workflows">
<input name="title" placeholder="title" required />
<select name="recurrence_type">
  <option>daily</option><option>weekly</option><option>monthly</option><option>quarterly</option><option>yearly</option>
</select>
<input name="timezone" value="UTC"/>
<button type="submit">Create</button>
</form>
<ul>{% for wf in workflows %}<li>{{ wf.title }} ({{ wf.recurrence_type }})</li>{% endfor %}</ul>
{% endblock %}
